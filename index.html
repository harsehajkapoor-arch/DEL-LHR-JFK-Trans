/* ─────────────────── REPORTS ─────────────────── */
const Reports = ({ mawbs, bags, newMawbs }) => {
  const [generated, setGenerated] = useState(false);

  const exportExcel = (type) => {
    let data = [], filename = "";
    if (type==="pending") {
      data = bags.filter(b=>b.status==="Pending at LHR"&&b.destinationType==="USA").map(b=>{
        const m=mawbs.find(x=>x.id===b.originalMawbId);
        return { "Bag Number":b.bagNumber, "Original MAWB":m?.mawbNumber||"", "Airline":m?.airline||"", "Arrived LHR":fmtDate(b.arrivalDate), "Days Pending":daysSince(b.arrivalDate), "Status":b.status, "Remarks":b.remarks };
      });
      filename = "PendingLHRBags.xlsx";
    } else if (type==="flown") {
      data = bags.filter(b=>b.status==="Flown to JFK").map(b=>{
        const m=mawbs.find(x=>x.id===b.originalMawbId), nm=newMawbs.find(x=>x.id===b.newMawbId);
        return { "Bag Number":b.bagNumber, "Original MAWB":m?.mawbNumber||"", "New MAWB":nm?.mawbNumber||"", "Airline":nm?.airline||"", "Flight":nm?.flightNumber||"", "Flight Date":fmtDate(nm?.flightDate), "Remarks":b.remarks };
      });
      filename = "FlownToJFKBags.xlsx";
    } else if (type==="aging") {
      data = bags.filter(b=>b.destinationType==="USA").map(b=>{
        const m=mawbs.find(x=>x.id===b.originalMawbId), nm=newMawbs.find(x=>x.id===b.newMawbId);
        return { "Bag Number":b.bagNumber, "Original MAWB":m?.mawbNumber||"", "Arrived LHR":fmtDate(b.arrivalDate), "Days Elapsed":daysSince(b.arrivalDate), "Status":b.status, "New MAWB":nm?.mawbNumber||"", "Airline":nm?.airline||"", "Remarks":b.remarks };
      });
      filename = "AgingReport.xlsx";
    } else if (type==="mawbs") {
      data = mawbs.map(m=>{
        const b=bags.filter(x=>x.originalMawbId===m.id), mb=b.filter(x=>x.destinationType==="USA");
        return { "Original MAWB":m.mawbNumber, "Airline":m.airline, "Flight":m.flightNumber, "Flight Date":fmtDate(m.flightDate), "Arrived LHR":fmtDate(m.arrivalDate), "Total Bags":b.length, "LHR Bags":b.filter(x=>x.destinationType==="LHR").length, "MB Bags":mb.length, "MB Pending":mb.filter(x=>["Pending at LHR","Arrived LHR"].includes(x.status)).length, "MB Flown":mb.filter(x=>x.status==="Flown to JFK").length, "Status":m.status };
      });
      filename = "MAWBSummary.xlsx";
    }
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Report");
    XLSX.writeFile(wb, filename);
    setGenerated(true);
    setTimeout(()=>setGenerated(false),3000);
  };

  const exportCSV = (type) => {
    let data = [], filename="";
    if (type==="pending") {
      data = bags.filter(b=>b.status==="Pending at LHR"&&b.destinationType==="USA").map(b=>{const m=mawbs.find(x=>x.id===b.originalMawbId); return [b.bagNumber,m?.mawbNumber||"",m?.airline||"",fmtDate(b.arrivalDate),daysSince(b.arrivalDate),b.status,b.remarks||""];});
      filename="PendingLHRBags.csv";
    } else if (type==="flown") {
      data = bags.filter(b=>b.status==="Flown to JFK").map(b=>{const m=mawbs.find(x=>x.id===b.originalMawbId),nm=newMawbs.find(x=>x.id===b.newMawbId); return [b.bagNumber,m?.mawbNumber||"",nm?.mawbNumber||"",nm?.airline||"",nm?.flightNumber||"",fmtDate(nm?.flightDate),b.remarks||""];});
      filename="FlownBags.csv";
    }
    const csv = data.map(r=>r.join(",")).join("\n");
    const a = document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download=filename; a.click();
    setGenerated(true); setTimeout(()=>setGenerated(false),3000);
  };

  const pendingCount = bags.filter(b=>b.status==="Pending at LHR"&&b.destinationType==="USA").length;
  const flownCount = bags.filter(b=>b.status==="Flown to JFK").length;
  const overdueCount = bags.filter(b=>b.status==="Pending at LHR"&&daysSince(b.arrivalDate)>3).length;

  const reports = [
    { id:"pending", icon:"⏳", title:"Pending LHR Bags", desc:`${pendingCount} bags currently waiting in LHR`, color:"text-amber-400", alert:pendingCount>0 },
    { id:"flown", icon:"🛫", title:"Flown to JFK Report", desc:`${flownCount} bags successfully forwarded`, color:"text-green-400" },
    { id:"aging", icon:"📅", title:"Aging Report (All MB Bags)", desc:"Day-by-day aging for all USA transit bags", color:"text-blue-400" },
    { id:"mawbs", icon:"📋", title:"MAWB Summary", desc:`${mawbs.length} MAWBs, ${newMawbs.length} LHR→JFK assignments`, color:"text-purple-400" },
  ];

  return (
    <div className="space-y-6 max-w-3xl">
      {generated && <div className="bg-green-500/10 border border-green-500/30 rounded-xl p-3 text-green-300 text-sm">✓ Report exported successfully</div>}

      {overdueCount>0 && (
        <div className="bg-amber-500/8 border border-amber-500/30 rounded-xl p-4 text-amber-300 text-sm">
          ⚠ <strong>{overdueCount} bags</strong> pending for more than 3 days — included in aging report
        </div>
      )}

      <div className="grid grid-cols-1 gap-4">
        {reports.map(r => (
          <div key={r.id} className={`bg-[#0f1629] border rounded-xl p-5 ${r.alert?"border-amber-500/30":"border-[#1e2d4a]"}`}>
            <div className="flex items-start justify-between mb-4">
              <div className="flex items-center gap-3">
                <span className="text-2xl">{r.icon}</span>
                <div>
                  <h3 className={`font-semibold ${r.color}`}>{r.title}</h3>
                  <p className="text-slate-500 text-sm mt-0.5">{r.desc}</p>
                </div>
              </div>
            </div>
            <div className="flex gap-3">
              <Btn variant="amber" size="sm" onClick={()=>exportExcel(r.id)}>⬇ Export Excel (.xlsx)</Btn>
              {(r.id==="pending"||r.id==="flown") && <Btn variant="ghost" size="sm" onClick={()=>exportCSV(r.id)}>⬇ Export CSV</Btn>}
            </div>
          </div>
        ))}
      </div>

      <div className="bg-[#0f1629] border border-[#1e2d4a] rounded-xl p-5">
        <h3 className="text-white font-semibold mb-4 text-sm">Quick Stats Summary</h3>
        <div className="grid grid-cols-2 gap-3 text-sm">
          {[
            ["Total MAWBs (DEL→LHR)", mawbs.length],
            ["Active MAWBs", mawbs.filter(m=>m.status==="active").length],
            ["Completed MAWBs", mawbs.filter(m=>m.status==="completed").length],
            ["New MAWBs (LHR→JFK)", newMawbs.length],
            ["Total Bags Tracked", bags.length],
            ["LHR Delivery Bags", bags.filter(b=>b.destinationType==="LHR").length],
            ["USA Transit Bags", bags.filter(b=>b.destinationType==="USA").length],
            ["Currently Pending LHR", pendingCount],
            ["Forwarded to JFK", flownCount],
            ["Overdue (>3 days)", overdueCount],
          ].map(([k,v])=>(
            <div key={k} className="flex items-center justify-between py-2 border-b border-[#0f1628]">
              <span className="text-slate-400">{k}</span>
              <span className="text-white font-semibold mono">{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ─────────────────── ACTIVITY LOGS ─────────────────── */
const ActivityLogs = ({ logs }) => {
  const [search, setSearch] = useState("");
  const filtered = useMemo(()=>logs.filter(l=>!search||l.action.toLowerCase().includes(search.toLowerCase())||l.details.toLowerCase().includes(search.toLowerCase())),[logs,search]);
  const { page, setPage, total, slice } = usePaginate(filtered, 15);
  const actionColors = { "MAWB Assigned":"text-purple-300", "Manifest Uploaded":"text-blue-300", "Bag Updated":"text-amber-300", "Login":"text-green-300" };
  return (
    <div className="space-y-5">
      <div className="relative max-w-sm">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search logs…" className="w-full bg-[#0f1629] border border-[#1e2d4a] rounded-lg pl-9 pr-3 py-2 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-amber-500/40"/>
      </div>
      <div className="space-y-2">
        {slice.map(l=>(
          <div key={l.id} className="bg-[#0f1629] border border-[#1e2d4a] rounded-xl p-4 flex items-start gap-4 hover:bg-[#1a2644] transition-colors">
            <div className="flex-shrink-0 mt-0.5">
              <div className="w-2 h-2 rounded-full bg-amber-400 mt-2"/>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-3 flex-wrap">
                <span className={`font-semibold text-sm ${actionColors[l.action]||"text-slate-300"}`}>{l.action}</span>
                <span className="text-slate-600 text-xs">by <span className="text-slate-400">{l.user}</span></span>
              </div>
              <p className="text-slate-400 text-sm mt-1 leading-relaxed">{l.details}</p>
            </div>
            <div className="text-slate-600 text-xs flex-shrink-0 whitespace-nowrap">{fmtDT(l.timestamp)}</div>
          </div>
        ))}
        {slice.length===0&&<EmptyState icon="🕐" title="No logs found" sub="Activity will appear here"/>}
      </div>
      <Pagination page={page} total={total} setPage={setPage}/>
    </div>
  );
};

/* ─────────────────── MAIN LAYOUT ─────────────────── */
const MainApp = ({ mawbs, setMawbs, bags, setBags, newMawbs, setNewMawbs, activityLogs, addLog, currentUser, onLogout, darkMode, setDarkMode, onExportData, onImportData, onCloudSave }) => {
  const [page, setPage] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [globalSearch, setGlobalSearch] = useState("");
  const [selectedMawb, setSelectedMawb] = useState(null);
  const [searchBag, setSearchBag] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [cloudOk, setCloudOk] = useState(isCloudReady());
  const [syncStatus, setSyncStatus] = useState(null);
  const [showCloudBanner, setShowCloudBanner] = useState(!isCloudReady());

  return (
    <div className={`flex h-screen overflow-hidden ${darkMode?"bg-[#080d1a]":"bg-slate-100"}`} style={{fontFamily:"Outfit,sans-serif"}}>
      
      <Sidebar page={page} setPage={p=>{setPage(p);if(p!=="mawbs")setSelectedMawb(null);}} collapsed={collapsed} user={currentUser} onLogout={onLogout} darkMode={darkMode} setDarkMode={setDarkMode} onExport={onExportData} onImport={()=>setShowImport(true)} cloudOk={cloudOk}/>
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <Topbar page={page} globalSearch={globalSearch} setGlobalSearch={setGlobalSearch} collapsed={collapsed} setCollapsed={setCollapsed}
          bags={bags} mawbs={mawbs} newMawbs={newMawbs} setPage={setPage} setSelectedMawb={setSelectedMawb} setSearchBag={setSearchBag} syncStatus={syncStatus}/>
        <main className="flex-1 overflow-y-auto p-6">
          {page==="dashboard" && <Dashboard mawbs={mawbs} bags={bags} newMawbs={newMawbs} setPage={setPage} setSearchBag={setSearchBag} onImportClick={()=>setShowImport(true)}/>}
          {page==="upload"    && <UploadManifest mawbs={mawbs} setMawbs={setMawbs} bags={bags} setBags={setBags} addLog={addLog}/>}
          {page==="mawbs"     && <MAWBManagement mawbs={mawbs} bags={bags} setBags={setBags} newMawbs={newMawbs} selectedMawb={selectedMawb} setSelectedMawb={setSelectedMawb} addLog={addLog}/>}
          {page==="pending"   && <PendingLHRBags bags={bags} mawbs={mawbs} newMawbs={newMawbs} setBags={setBags} addLog={addLog}/>}
          {page==="assign"    && <AssignNewMAWB mawbs={mawbs} bags={bags} newMawbs={newMawbs} setNewMawbs={setNewMawbs} setBags={setBags} addLog={addLog}/>}
          {page==="reports"   && <Reports mawbs={mawbs} bags={bags} newMawbs={newMawbs}/>}
          {page==="logs"      && <ActivityLogs logs={activityLogs}/>}
        </main>
      </div>
      {searchBag && <BagDetailModal bag={searchBag} mawbs={mawbs} newMawbs={newMawbs} onClose={()=>setSearchBag(null)}/>}
      {showCloudBanner && !isCloudReady() && (
        <CloudSetupBanner onDismiss={()=>setShowCloudBanner(false)}/>
      )}
      {showImport && <ImportModal onImport={d=>{onImportData(d);if(isCloudReady()){setSyncStatus("saving");CloudDB.save({mawbs:d.mawbs||[], bags:d.bags||[], newMawbs:d.newMawbs||[], logs:d.logs||[]}).then(r=>{setSyncStatus(r.ok?"saved":"error");setTimeout(()=>setSyncStatus(null),3000);});};}} onClose={()=>setShowImport(false)}/>}
    </div>
  );
};

/* ─────────────────── ROOT ─────────────────── */
const LS = {
  get: (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); }
    catch {}
  },
};

function App() {
  const [auth, setAuth]         = useState(false);
  const [user, setUser]         = useState(null);
  const [darkMode, setDarkMode] = useState(()  => LS.get('ct_dark',     true));
  const [mawbs,    setMawbs]    = useState(()  => LS.get('ct_mawbs',    []));
  const [newMawbs, setNewMawbs] = useState(()  => LS.get('ct_newmawbs', []));
  const [logs,     setLogs]     = useState(()  => LS.get('ct_logs',     []));

  /* ── ONE-TIME MIGRATION ──────────────────────────────────────────────
     USA/MB bags imported before the status fix were saved with
     "Arrived LHR". Correct them to "Pending at LHR" on startup.
     Bags that are already Flown/Delivered/Assigned are left untouched.
  ─────────────────────────────────────────────────────────────────── */
  const [bags, setBags] = useState(() => {
    const stored = LS.get('ct_bags', []);
    const needsFix = stored.some(b => b.destinationType === "USA" && b.status === "Arrived LHR");
    if (!needsFix) return stored;
    const fixed = stored.map(b =>
      b.destinationType === "USA" && b.status === "Arrived LHR"
        ? { ...b, status: "Pending at LHR" }
        : b
    );
    LS.set('ct_bags', fixed); // write fix to localStorage immediately
    return fixed;
  });

  /* Sync every state slice to localStorage whenever it changes */
  useEffect(() => { LS.set('ct_mawbs',    mawbs);    }, [mawbs]);
  useEffect(() => { LS.set('ct_bags',     bags);     }, [bags]);
  useEffect(() => { LS.set('ct_newmawbs', newMawbs); }, [newMawbs]);
  useEffect(() => { LS.set('ct_logs',     logs);     }, [logs]);
  useEffect(() => { LS.set('ct_dark',     darkMode); }, [darkMode]);

  const addLog = useCallback((action, details) => {
    setLogs(prev => [{
      id: genId(),
      timestamp: new Date().toISOString(),
      action,
      details,
      user: user?.username || "admin"
    }, ...prev]);
  }, [user]);

  const onExportData = () => exportData(mawbs, bags, newMawbs, logs);
  const onImportData = d => {
    const m=d.mawbs||[], b=d.bags||[], n=d.newMawbs||[], l=d.logs||[];
    setMawbs(m); setBags(b); setNewMawbs(n); setLogs(l);
    LS.set("ct_mawbs",m); LS.set("ct_bags",b); LS.set("ct_newmawbs",n); LS.set("ct_logs",l);
  };

  // Auto-save to cloud whenever data changes (debounced 2s)
  const cloudSaveTimer = useRef(null);
  const onCloudSave = useCallback((m,b,n,l) => {
    if (!isCloudReady()) return;
    if (cloudSaveTimer.current) clearTimeout(cloudSaveTimer.current);
    cloudSaveTimer.current = setTimeout(() => { CloudDB.save({mawbs:m, bags:b, newMawbs:n, logs:l}); }, 2000);
  }, []);

  useEffect(() => { onCloudSave(mawbs,bags,newMawbs,logs); }, [mawbs,bags,newMawbs,logs]);

  // On first load: load from cloud OR save existing data to cloud
  useEffect(() => {
    if (!isCloudReady()) return;
    if (bags.length === 0 && mawbs.length === 0) {
      // No local data — load from cloud (incognito, new browser)
      CloudDB.load().then(d => {
        if (d?.bags?.length || d?.mawbs?.length) {
          onImportData(d);
          console.log("✓ Loaded " + d.bags.length + " bags from cloud");
        }
      });
    } else {
      // Has local data — immediately save to cloud so other browsers get it
      CloudDB.save({ mawbs, bags, newMawbs, logs }).then(r => {
        console.log(r.ok ? "✓ Data synced to cloud on startup" : "✗ Cloud save failed: " + r.err);
      });
    }
  }, []);

  if (!auth) return <LoginPage onLogin={u => { setUser(u); setAuth(true); }} />;

  return (
    <MainApp
      mawbs={mawbs}       setMawbs={setMawbs}
      bags={bags}         setBags={setBags}
      newMawbs={newMawbs} setNewMawbs={setNewMawbs}
      activityLogs={logs} addLog={addLog}
      currentUser={user}  onLogout={() => setAuth(false)}
      darkMode={darkMode} setDarkMode={setDarkMode}
      onExportData={onExportData} onImportData={onImportData} onCloudSave={onCloudSave}
    />
  );
}


    /* ═══════════════ MOUNT ═══════════════ */
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
